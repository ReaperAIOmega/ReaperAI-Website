<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Johnson Strategic Solutions | Client Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="navbar" data-navbar="navbar-public.html"></div>

  <div class="form-card" style="max-width: 460px; margin-top: 120px;">
    <h2 class="center">Client Login</h2>
    <p class="center">
      Access your client dashboard, portal, documents, and account updates.
    </p>

    <form action="https://portal.reaperai.com/dashboard.html" method="GET">
      <label>Email</label>
      <input type="email" name="email" placeholder="Enter your email" required>

      <label>Password</label>
      <input type="password" name="password" placeholder="Enter your password" required>

      <button type="submit" class="button" style="width: 100%;">Login</button>
    </form>

    <div class="button-row" style="margin-top: 18px;">
      <a href="https://portal.reaperai.com/dashboard.html" class="button">Go To Client Dashboard</a>
      <a href="https://portal.reaperai.com/client-portal.html" class="btn-secondary">Open Client Portal</a>
    </div>

    <div class="center" style="margin-top: 18px;">
      <a href="intake.html" style="display:block; margin-top:8px; color:#7fb8ff; text-decoration:none;">
        Not a client yet? Start here
      </a>
    </div>
  </div>

  <div class="footer">© Johnson Strategic Solutions</div>

  <script src="load-navbar.js"></script>
</body>
</html>
