<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Johnson Strategic Solutions | Client Login</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(rgba(5,10,20,0.85), rgba(5,10,20,0.95)),
                url("https://images.unsplash.com/photo-1520607162513-77705c0f0d4a?auto=format&fit=crop&w=1600&q=80");
    background-size: cover;
    background-position: center;
    color: white;
}

.navbar {
    background: rgba(10,15,25,0.95);
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
}

.logo {
    font-size: 24px;
    font-weight: bold;
}

.nav-links {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
}

.nav-links a {
    color: #7fb8ff;
    text-decoration: none;
    font-weight: bold;
}

.login-container {
    max-width: 420px;
    margin: 120px auto;
    background: rgba(12,18,30,0.9);
    padding: 30px;
    border-radius: 14px;
    border: 1px solid rgba(77,166,255,0.15);
    box-shadow: 0 20px 50px rgba(0,0,0,0.45);
}

.login-container h2 {
    margin-top: 0;
    margin-bottom: 18px;
}

input {
    width: 100%;
    padding: 12px;
    margin-bottom: 14px;
    border-radius: 8px;
    border: none;
    font-size: 16px;
}

.button {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    font-size: 16px;
    font-weight: bold;
    background: linear-gradient(135deg,#4da6ff,#1e7de0);
    color: #08111d;
    cursor: pointer;
}

.secondary-links {
    margin-top: 16px;
    text-align: center;
}

.secondary-links a {
    display: block;
    margin-top: 8px;
    color: #7fb8ff;
    text-decoration: none;
    font-size: 14px;
}

.footer {
    text-align: center;
    padding: 24px;
    color: rgba(255,255,255,0.65);
    font-size: 13px;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">Johnson Strategic Solutions</div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="services.html">Services</a>
        <a href="credit-repair.html">Credit Repair</a>
        <a href="business-setup.html">Business Setup</a>
        <a href="funding.html">Funding</a>
        <a href="automation.html">Automation</a>
        <a href="pricing.html">Pricing</a>
        <a href="intake.html">Start Here</a>
        <a href="login.html">Client Login</a>
    </div>
</div>

<div class="login-container">
    <h2>Client Login</h2>
    <form action="dashboard.html">
        <input type="text" placeholder="Email">
        <input type="password" placeholder="Password">
        <button class="button">Login</button>
    </form>

    <div class="secondary-links">
        <a href="client-portal.html">Open Client Portal</a>
        <a href="intake.html">Not a client yet? Start here</a>
    </div>
</div>

<div class="footer">
    © Johnson Strategic Solutions
</div>

</body>
</html>
