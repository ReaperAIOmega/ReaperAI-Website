<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You | Reaper AI</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        linear-gradient(rgba(5, 10, 20, 0.86), rgba(5, 10, 20, 0.92)),
        url("https://images.unsplash.com/photo-1520607162513-77705c0f0d4a?auto=format&fit=crop&w=1600&q=80")
        center center / cover no-repeat;
      color: white;
      padding: 20px;
      box-sizing: border-box;
    }

    .card {
      max-width: 680px;
      width: 100%;
      background: rgba(12, 18, 30, 0.88);
      border: 1px solid rgba(77, 166, 255, 0.25);
      border-radius: 18px;
      padding: 36px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
    }

    h1 {
      font-size: 34px;
      margin-bottom: 12px;
    }

    p {
      color: #d7e6ff;
      line-height: 1.6;
      margin-bottom: 22px;
    }

    a {
      display: inline-block;
      text-decoration: none;
      background: linear-gradient(135deg, #4da6ff, #1e7de0);
      color: #08111d;
      font-weight: bold;
      padding: 14px 24px;
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Thank You</h1>
    <p>Your intake form has been submitted successfully. We’ll review it and follow up with the next step.</p>
    <a href="index.html">Return Home</a>
  </div>
</body>
</html>
