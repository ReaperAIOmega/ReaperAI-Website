<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Johnson Strategic Solutions | Client Intake</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(rgba(5,10,20,0.85), rgba(5,10,20,0.95)),
                url("https://images.unsplash.com/photo-1520607162513-77705c0f0d4a?auto=format&fit=crop&w=1600&q=80");
    background-size: cover;
    background-position: center;
    color: white;
}

.navbar {
    background: rgba(10,15,25,0.95);
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
}

.logo {
    font-size: 24px;
    font-weight: bold;
}

.nav-links {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
}

.nav-links a {
    color: #7fb8ff;
    text-decoration: none;
    font-weight: bold;
}

.container {
    max-width: 800px;
    margin: 60px auto;
    background: rgba(12,18,30,0.9);
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

h1 {
    text-align: center;
    margin-bottom: 10px;
}

p {
    text-align: center;
    color: #cfe3ff;
    margin-bottom: 25px;
}

label {
    display: block;
    margin-top: 15px;
    margin-bottom: 5px;
}

input, select, textarea {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    margin-bottom: 10px;
    box-sizing: border-box;
}

textarea {
    height: 120px;
}

.button {
    display: inline-block;
    background: linear-gradient(135deg,#4da6ff,#1e7de0);
    color: #08111d;
    padding: 14px 22px;
    border-radius: 10px;
    text-decoration: none;
    font-weight: bold;
    border: none;
    cursor: pointer;
    margin-top: 10px;
}

.button:hover {
    opacity: 0.9;
}

.button-secondary {
    background: rgba(255,255,255,0.1);
    color: white;
    margin-left: 10px;
}

.button-container {
    margin-top: 20px;
    text-align: center;
}

.status-message {
    margin-top: 15px;
    text-align: center;
    color: #cfe3ff;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">Johnson Strategic Solutions</div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="services.html">Services</a>
        <a href="credit-repair.html">Credit Repair</a>
        <a href="business-setup.html">Business Setup</a>
        <a href="funding.html">Funding</a>
        <a href="automation.html">Automation</a>
        <a href="pricing.html">Pricing</a>
        <a href="intake.html">Start Here</a>
        <a href="login.html">Client Login</a>
    </div>
</div>

<div class="container">
    <h1>Client Intake Form</h1>
    <p>Fill out this form so we can review your situation and move forward.</p>

    <form id="intake-form">
        <input type="hidden" name="_subject" value="New Johnson Strategic Solutions Intake Submission">

        <label>Full Name</label>
        <input type="text" name="Full Name" required>

        <label>Email</label>
        <input type="email" name="Email" required>

        <label>Phone</label>
        <input type="text" name="Phone">

        <label>Service Needed</label>
        <select name="Service Needed">
            <option>Credit Repair</option>
            <option>Business Funding</option>
            <option>Personal Funding</option>
            <option>Business Setup</option>
            <option>Automation / AI Systems</option>
            <option>Consultation</option>
        </select>

        <label>Estimated Credit Score</label>
        <input type="text" name="Estimated Credit Score">

        <label>Funding Amount Needed</label>
        <input type="text" name="Funding Amount Needed">

        <label>Notes</label>
        <textarea name="Notes"></textarea>

        <div class="button-container">
            <button type="submit" class="button" id="submit-btn">Submit Intake</button>
            <a href="index.html" class="button button-secondary">Return Home</a>
        </div>

        <div class="status-message" id="status-message"></div>
    </form>
</div>

<script>
const form = document.getElementById("intake-form");
const statusMessage = document.getElementById("status-message");
const submitBtn = document.getElementById("submit-btn");

form.addEventListener("submit", async function(event) {
    event.preventDefault();

    submitBtn.disabled = true;
    submitBtn.textContent = "Submitting...";
    statusMessage.textContent = "Sending your intake...";

    const formData = new FormData(form);

    try {
        const response = await fetch("https://formspree.io/f/xbdpyazb", {
            method: "POST",
            body: formData,
            headers: {
                "Accept": "application/json"
            }
        });

        if (response.ok) {
            window.location.href = "thank-you.html";
        } else {
            statusMessage.textContent = "Something went wrong. Please try again.";
            submitBtn.disabled = false;
            submitBtn.textContent = "Submit Intake";
        }
    } catch (error) {
        statusMessage.textContent = "Network error. Please try again.";
        submitBtn.disabled = false;
        submitBtn.textContent = "Submit Intake";
    }
});
</script>

</body>
</html>
