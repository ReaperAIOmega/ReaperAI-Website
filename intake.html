<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Johnson Strategic Solutions | Client Intake</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="navbar" data-navbar="navbar-public.html"></div>

  <div class="form-card">
    <h2 class="center">Client Intake Form</h2>
    <p class="center">Fill out this form so we can review your situation and move forward.</p>

    <form id="intake-form">
      <input type="hidden" name="_subject" value="New Johnson Strategic Solutions Intake Submission">

      <label>Full Name</label>
      <input type="text" name="Full Name" required>

      <label>Email</label>
      <input type="email" name="Email" required>

      <label>Phone</label>
      <input type="text" name="Phone">

      <label>Service Needed</label>
      <select name="Service Needed">
        <option>Credit Repair</option>
        <option>Business Setup</option>
        <option>Business Funding</option>
        <option>Automation / AI Systems</option>
        <option>Platform Setup</option>
        <option>Consultation</option>
      </select>

      <label>Estimated Credit Score</label>
      <input type="text" name="Estimated Credit Score">

      <label>Funding Amount Needed</label>
      <input type="text" name="Funding Amount Needed">

      <label>Notes</label>
      <textarea name="Notes"></textarea>

      <div class="button-row">
        <button type="submit" class="button" id="submit-btn">Submit Intake</button>
        <a href="index.html" class="btn-secondary">Return Home</a>
      </div>

      <div class="status-message" id="status-message"></div>
    </form>
  </div>

  <div class="footer">© Johnson Strategic Solutions</div>

  <script src="load-navbar.js"></script>
<script>
const form = document.getElementById("intake-form");
const statusMessage = document.getElementById("status-message");
const submitBtn = document.getElementById("submit-btn");

form.addEventListener("submit", async function(event) {
  event.preventDefault();

  submitBtn.disabled = true;
  submitBtn.textContent = "Submitting...";
  statusMessage.textContent = "Sending your intake...";

  const params = new URLSearchParams();
  params.append("fullName", form.querySelector('[name="Full Name"]').value);
  params.append("email", form.querySelector('[name="Email"]').value);
  params.append("phone", form.querySelector('[name="Phone"]').value);
  params.append("serviceNeeded", form.querySelector('[name="Service Needed"]').value);
  params.append("creditScore", form.querySelector('[name="Estimated Credit Score"]').value);
  params.append("fundingAmount", form.querySelector('[name="Funding Amount Needed"]').value);
  params.append("notes", form.querySelector('[name="Notes"]').value);

  try {
    const response = await fetch("https://script.google.com/macros/s/AKfycbzH82fTtqq-skhhQ1jXMvfHoSdIY3OpugYlY1CQkFT3bpT3NkP8PPBUAS9ZzoWrjq38Hg/exec", {
      method: "POST",
      body: params
    });

    const result = await response.json();

    if (result.success) {
      window.location.href = "thank-you.html";
    } else {
      statusMessage.textContent = "Submission failed. Please try again.";
      submitBtn.disabled = false;
      submitBtn.textContent = "Submit Intake";
    }
  } catch (error) {
    statusMessage.textContent = "Network error. Please try again.";
    submitBtn.disabled = false;
    submitBtn.textContent = "Submit Intake";
  }
});
</script>
</body>
</html>
