<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reaper AI | Client Intake</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(rgba(5,10,20,0.85), rgba(5,10,20,0.95)),
                url("https://images.unsplash.com/photo-1520607162513-77705c0f0d4a?auto=format&fit=crop&w=1600&q=80");
    background-size: cover;
    background-position: center;
    color: white;
}

/* NAV BAR */
.navbar {
    background: rgba(10,15,25,0.95);
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    font-size: 24px;
    font-weight: bold;
}

.nav-links a {
    color: #7fb8ff;
    text-decoration: none;
    margin-left: 20px;
    font-weight: bold;
}

/* FORM CONTAINER */
.container {
    max-width: 800px;
    margin: 60px auto;
    background: rgba(12,18,30,0.9);
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

h1 {
    text-align: center;
    margin-bottom: 10px;
}

p {
    text-align: center;
    color: #cfe3ff;
    margin-bottom: 25px;
}

label {
    display: block;
    margin-top: 15px;
    margin-bottom: 5px;
}

input, select, textarea {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    margin-bottom: 10px;
}

textarea {
    height: 120px;
}

.button {
    display: inline-block;
    background: linear-gradient(135deg,#4da6ff,#1e7de0);
    color: #08111d;
    padding: 14px 22px;
    border-radius: 10px;
    text-decoration: none;
    font-weight: bold;
    border: none;
    cursor: pointer;
    margin-top: 10px;
}

.button-secondary {
    background: rgba(255,255,255,0.1);
    color: white;
    margin-left: 10px;
}

.button-container {
    margin-top: 20px;
    text-align: center;
}
</style>
</head>

<body>

<!-- NAV BAR -->
<div class="navbar">
    <div class="logo">Reaper AI</div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="services.html">Services</a>
        <a href="pricing.html">Pricing</a>
        <a href="intake.html">Client Intake</a>
        <a href="contact.html">Contact</a>
        <a href="login.html">Login</a>
    </div>
</div>

<!-- FORM -->
<div class="container">
    <h1>Client Intake Form</h1>
    <p>Fill out this form so we can review your situation and move forward.</p>

    <form action="https://formspree.io/f/xbdpyazb" method="POST">

        <input type="hidden" name="_subject" value="New Reaper AI Intake Submission">
        <input type="hidden" name="_redirect" value="https://reaperai.com/thank-you.html">

        <label>Full Name</label>
        <input type="text" name="Full Name" required>

        <label>Email</label>
        <input type="email" name="Email" required>

        <label>Phone</label>
        <input type="text" name="Phone">

        <label>Service Needed</label>
        <select name="Service Needed">
            <option>Credit Repair</option>
            <option>Business Funding</option>
            <option>Personal Funding</option>
            <option>Business Setup</option>
            <option>Automation / AI Systems</option>
            <option>Consultation</option>
        </select>

        <label>Estimated Credit Score</label>
        <input type="text" name="Estimated Credit Score">

        <label>Funding Amount Needed</label>
        <input type="text" name="Funding Amount Needed">

        <label>Notes</label>
        <textarea name="Notes"></textarea>

        <div class="button-container">
            <button type="submit" class="button">Submit Intake</button>
            <a href="index.html" class="button button-secondary">Return Home</a>
        </div>

    </form>
</div>

</body>
</html>
